name: Build SPLACE Desktop

# Trigger on version tag pushes (e.g. git tag v4.0.1 && git push --tags)
# and on manual dispatch for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            zip_name: SPLACE-windows-x64.zip
          - os: macos-latest
            platform_flag: --mac
            zip_name: SPLACE-macos-universal.zip
          - os: ubuntu-latest
            platform_flag: --linux
            zip_name: SPLACE-linux-x64.zip

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.os }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      # ── 3. Install Electron dependencies ────────────────────────────────────
      - name: Install dependencies
        run: npm install
        working-directory: electron

      # ── 4. Linux: system libraries required by Electron ─────────────────────
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libxtst6 xauth xvfb fakeroot

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: npx electron-builder ${{ matrix.platform_flag }}
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # ── 6a. Windows: zip the portable .exe ───────────────────────────────────
      - name: Package Windows ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem electron/dist -Filter "*.exe" | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "electron/dist/${{ matrix.zip_name }}"

      # ── 6b. macOS: rename the zip electron-builder already created ───────────
      - name: Package macOS ZIP
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd electron/dist
          mv *.zip "${{ matrix.zip_name }}"

      # ── 6c. Linux: zip the AppImage ──────────────────────────────────────────
      - name: Package Linux ZIP
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd electron/dist
          zip "${{ matrix.zip_name }}" *.AppImage

      # ── 7. Upload ZIP as workflow artifact ───────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: electron/dist/${{ matrix.zip_name }}
          if-no-files-found: error
          retention-days: 30

  # ── Attach all ZIPs to the GitHub Release when triggered by a tag ───────────
  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-zips
          merge-multiple: true

      - name: List files
        run: find release-zips -type f

      - name: Upload ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-zips/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
