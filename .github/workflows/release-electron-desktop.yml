name: Build desktop release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            target: win
            platform_slug: windows-x64
            output_ext: exe
          - os: ubuntu-latest
            label: Linux x64
            target: linux
            platform_slug: linux-x64
            output_ext: AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Check Electron package
        shell: bash
        run: |
          set -euo pipefail
          test -f electron/package.json
          test -f electron/package-lock.json
          test -d docs

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Build app
        shell: bash
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:${{ matrix.target }}

      - name: Normalize artifact name
        id: artifact
        shell: bash
        working-directory: electron
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual}"
          safe_tag="${tag//\//-}"
          file="$(find dist -type f -name '*.${{ matrix.output_ext }}' | sort | head -n 1)"
          if [ -z "$file" ]; then
            echo "No build output found for *.${{ matrix.output_ext }}" >&2
            find dist -type f >&2 || true
            exit 1
          fi
          out="SPLACE-${safe_tag}-${{ matrix.platform_slug }}.${{ matrix.output_ext }}"
          cp "$file" "$out"
          echo "path=electron/$out" >> "$GITHUB_OUTPUT"
          echo "name=$out" >> "$GITHUB_OUTPUT"

      - name: Upload file to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.artifact.outputs.path }}

      - name: Upload workflow artifact for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
